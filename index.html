<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>יומן אימוני קונג פו</title>
<meta name="theme-color" content="#C1121F">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="קונג פו">
<style>
:root {
  --font-display: Georgia, 'Times New Roman', serif;
  --font-body: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
  --crimson: #C1121F;
  --dark-red: #780000;
  --black: #0a0a0a;
  --charcoal: #1a1a1a;
  --gold: #D4A017;
  --light-gold: #F0C040;
  --paper: #f5f0e8;
  --muted: #777;
}
html { background:#0a0a0a; }
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

body {
  font-family:var(--font-body);
  background:var(--black);
  color:var(--paper);
  min-height:100vh;
  overflow-x:hidden;
}

body::before {
  content:''; position:fixed; inset:0;
  background:
    radial-gradient(ellipse at 20% 50%, rgba(193,18,31,0.07) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 20%, rgba(212,160,23,0.04) 0%, transparent 50%);
  pointer-events:none; z-index:0;
}

.app { position:relative; z-index:1; max-width:720px; margin:0 auto; padding:20px 16px 80px; }

/* HEADER */
header { text-align:center; padding:28px 0 18px; }
header::after {
  content:''; display:block; height:2px; margin-top:16px;
  background:linear-gradient(90deg,transparent,var(--crimson),var(--gold),var(--crimson),transparent);
}
.header-badge {
  font-size:48px; margin-bottom:8px;
  filter:drop-shadow(0 0 20px rgba(193,18,31,0.6));
  animation:pulse-glow 3s ease-in-out infinite;
}
@keyframes pulse-glow {
  0%,100% { filter:drop-shadow(0 0 18px rgba(193,18,31,0.5)); }
  50%      { filter:drop-shadow(0 0 32px rgba(212,160,23,0.8)); }
}
h1 {
  font-family:var(--font-display); font-size:clamp(20px,5vw,32px); font-weight:900; letter-spacing:2px;
  background:linear-gradient(135deg,var(--paper) 0%,var(--light-gold) 100%);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
}
.subtitle { font-size:11px; color:var(--muted); letter-spacing:3px; text-transform:uppercase; margin-top:5px; }

/* DATE */
.date-strip {
  background:var(--charcoal); border:1px solid rgba(212,160,23,0.2);
  border-radius:12px; padding:12px 18px;
  display:flex; justify-content:space-between; align-items:center;
  margin:14px 0; flex-wrap:wrap; gap:8px;
}
.date-text { font-family:var(--font-display); font-size:13px; color:var(--light-gold); }
.streak-badge {
  background:linear-gradient(135deg,var(--dark-red),var(--crimson));
  border-radius:20px; padding:5px 14px; font-size:12px; font-weight:700; color:#fff;
  display:flex; align-items:center; gap:5px;
}



/* TIME SELECTOR */
.time-selector {
  background:var(--charcoal); border:1px solid rgba(255,255,255,0.08);
  border-radius:14px; padding:16px 18px; margin-bottom:14px;
}
.section-label {
  font-size:10px; letter-spacing:4px; text-transform:uppercase;
  color:var(--crimson); margin-bottom:12px;
  display:flex; align-items:center; gap:10px;
}
.section-label::after { content:''; flex:1; height:1px; background:linear-gradient(90deg,rgba(193,18,31,0.4),transparent); }

.time-presets { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:12px; }
.time-preset {
  padding:8px 16px; border-radius:20px; font-size:13px; font-weight:700;
  cursor:pointer; border:1px solid rgba(255,255,255,0.1);
  background:rgba(255,255,255,0.06); color:var(--muted);
  font-family:var(--font-body); touch-action:manipulation;
  transition:all 0.18s;
}
.time-preset.active { background:linear-gradient(135deg,var(--dark-red),var(--crimson)); border-color:transparent; color:#fff; }

.time-slider-row { display:flex; align-items:center; gap:12px; }
.time-slider {
  flex:1; -webkit-appearance:none; appearance:none;
  height:6px; border-radius:99px; background:rgba(255,255,255,0.1); outline:none; cursor:pointer;
}
.time-slider::-webkit-slider-thumb {
  -webkit-appearance:none; width:22px; height:22px;
  border-radius:50%; background:var(--crimson);
  box-shadow:0 0 8px rgba(193,18,31,0.5); cursor:pointer;
}
.time-value { font-family:var(--font-display); font-size:18px; font-weight:700; color:var(--light-gold); min-width:70px; text-align:left; }

/* GENERATE BUTTON */
.btn-generate {
  width:100%; padding:14px; border-radius:12px; border:none;
  background:linear-gradient(135deg,var(--dark-red),var(--crimson));
  color:#fff; font-family:var(--font-body); font-size:15px; font-weight:700;
  cursor:pointer; margin-bottom:16px; box-shadow:0 4px 20px rgba(193,18,31,0.35);
  touch-action:manipulation; transition:all 0.2s;
}
.btn-generate:active { opacity:0.85; transform:scale(0.98); }

/* SESSION BLOCK */
.session-block {
  background:var(--charcoal); border:1px solid rgba(255,255,255,0.06);
  border-radius:14px; margin-bottom:10px; overflow:hidden; transition:border-color 0.22s;
}
.session-block.done { border-color:rgba(193,18,31,0.35); }

.session-block-header {
  display:flex; align-items:center; gap:12px; padding:14px 16px;
  cursor:pointer; position:relative; touch-action:manipulation;
  -webkit-user-select:none; user-select:none;
}
.session-block-header::before {
  content:''; position:absolute; top:0; right:0; width:3px; height:100%;
  background:var(--crimson); opacity:0; transition:opacity 0.22s;
  border-radius:0 14px 14px 0;
}
.session-block.done .session-block-header::before { opacity:1; }

.block-check {
  width:24px; height:24px; border-radius:50%; flex-shrink:0;
  border:2px solid rgba(255,255,255,0.15);
  display:flex; align-items:center; justify-content:center;
  font-size:13px; transition:all 0.22s;
}
.session-block.done .block-check { background:var(--crimson); border-color:var(--crimson); color:#fff; }

.block-icon { font-size:22px; flex-shrink:0; }
.block-info { flex:1; }
.block-name { font-size:15px; font-weight:700; color:var(--paper); }
.block-meta { font-size:12px; color:var(--muted); margin-top:2px; }
.block-duration { font-family:var(--font-display); font-size:13px; font-weight:700; color:var(--light-gold); flex-shrink:0; }


/* BLOCK BODY */
.block-body { padding:0 16px 14px 16px; }
.block-simple-desc { font-size:13px; color:rgba(245,240,232,0.6); line-height:1.65; }

.drill-card {
  background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.07);
  border-radius:10px; padding:12px 14px; margin-top:8px;
  display:flex; align-items:flex-start; gap:10px;
}
.drill-code {
  background:rgba(193,18,31,0.18); border:1px solid rgba(193,18,31,0.35);
  border-radius:6px; padding:2px 9px; font-size:13px; font-weight:700;
  color:var(--crimson); white-space:nowrap; direction:ltr; flex-shrink:0;
}
.drill-name { font-size:13px; font-weight:700; color:var(--paper); }
.drill-desc { font-size:12px; color:rgba(245,240,232,0.55); margin-top:3px; line-height:1.55; }
.drill-tags { display:flex; gap:6px; flex-wrap:wrap; margin-top:6px; }
.drill-tag { background:rgba(255,255,255,0.07); border-radius:20px; padding:2px 10px; font-size:11px; color:var(--paper); }

.form-card {
  background:linear-gradient(135deg,rgba(120,0,0,0.3),rgba(30,30,30,0.8));
  border:1px solid rgba(212,160,23,0.2); border-radius:10px; padding:12px 14px; margin-top:8px;
}
.form-card-name { font-family:var(--font-display); font-size:16px; font-weight:700; color:var(--paper); }
.form-card-sub { font-size:12px; color:rgba(245,240,232,0.5); margin-top:2px; }
.form-card-focus { font-size:12px; color:rgba(212,160,23,0.85); margin-top:7px; line-height:1.5; }
.form-card-reps { font-size:12px; color:rgba(245,240,232,0.6); margin-top:4px; font-style:italic; }

/* STANCES TIMER */
.stances-timer {
  margin: 10px 16px 14px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(212,160,23,0.15);
  border-radius: 12px;
  padding: 16px;
  text-align: center;
}
.stances-display {
  font-family: var(--font-display);
  font-size: 52px; font-weight: 900;
  letter-spacing: -2px; color: var(--paper);
  line-height: 1; margin-bottom: 4px;
  transition: color 0.3s;
}
.stances-display.running { color: var(--light-gold); }
.stances-display.finished { color: var(--crimson); }
.stances-sub {
  font-size: 11px; color: var(--muted);
  letter-spacing: 3px; text-transform: uppercase;
  margin-bottom: 14px;
}
.stances-progress-bg {
  background: rgba(255,255,255,0.07);
  border-radius: 99px; height: 5px;
  overflow: hidden; margin-bottom: 14px;
}
.stances-progress-fill {
  height: 100%; border-radius: 99px;
  background: linear-gradient(90deg, var(--dark-red), var(--crimson), var(--gold));
  transition: width 1s linear; width: 100%;
}
.stances-btns { display: flex; gap: 8px; justify-content: center; }
.stances-timer.gong-flash {
  animation: gong-ripple 0.7s ease-out;
}
.stances-timer.finish-flash {
  animation: finish-ripple 1.2s ease-out;
}
@keyframes gong-ripple {
  0%   { box-shadow: 0 0 0 0 rgba(212,160,23,0.7); border-color: rgba(212,160,23,0.9); }
  50%  { box-shadow: 0 0 0 18px rgba(212,160,23,0); }
  100% { box-shadow: 0 0 0 0 rgba(212,160,23,0); border-color: rgba(212,160,23,0.15); }
}
@keyframes finish-ripple {
  0%   { box-shadow: 0 0 0 0 rgba(193,18,31,0.9); border-color: var(--crimson); }
  40%  { box-shadow: 0 0 0 28px rgba(193,18,31,0); }
  70%  { box-shadow: 0 0 0 0 rgba(193,18,31,0); border-color: var(--crimson); }
  85%  { border-color: var(--gold); }
  100% { border-color: rgba(193,18,31,0.5); }
}


.progress-wrap {
  background:var(--charcoal); border-radius:12px; padding:14px 18px;
  margin-bottom:12px; border:1px solid rgba(255,255,255,0.06);
}
.progress-label { display:flex; justify-content:space-between; font-size:12px; color:var(--muted); margin-bottom:8px; }
.progress-bar-bg { background:rgba(255,255,255,0.07); border-radius:99px; height:7px; overflow:hidden; }
.progress-bar-fill { height:100%; border-radius:99px; background:linear-gradient(90deg,var(--dark-red),var(--crimson),var(--gold)); transition:width 0.6s ease; }





.btn {
  padding:11px 22px; border-radius:10px; border:none;
  font-family:var(--font-body); font-size:13px; font-weight:700;
  cursor:pointer; touch-action:manipulation; transition:all 0.2s;
}
.btn-red { background:linear-gradient(135deg,var(--dark-red),var(--crimson)); color:#fff; box-shadow:0 4px 14px rgba(193,18,31,0.3); }
.btn-ghost { background:rgba(255,255,255,0.07); color:var(--paper); border:1px solid rgba(255,255,255,0.1); }
.btn-ghost:active, .btn-red:active { opacity:0.8; }
.btn-small { padding:7px 14px; font-size:12px; }



/* TOAST */
.toast {
  position:fixed; bottom:28px; left:50%;
  transform:translateX(-50%) translateY(90px);
  background:var(--crimson); color:#fff;
  padding:11px 26px; border-radius:30px; font-weight:700; font-size:13px;
  transition:transform 0.3s ease; z-index:100; white-space:nowrap;
}
.toast.show { transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div class="app">

  <header>
    <div class="header-badge">🥋</div>
    <h1>יומן אימוני קונג פו</h1>
    <div class="subtitle">אימון מותאם אישית</div>
  </header>

  <div class="date-strip">
    <div class="date-text" id="dateDisplay"></div>
  </div>

  <div id="tab-today" class="tab-content active">
    <div class="time-selector">
      <div class="section-label">כמה זמן יש לך היום?</div>
      <div class="time-presets" id="timePresets"></div>
      <div class="time-slider-row">
        <input type="range" class="time-slider" id="timeSlider" min="20" max="90" step="5" value="30">
        <div class="time-value" id="timeValue">30 דקות</div>
      </div>
    </div>
    <button class="btn-generate" id="generateBtn">🎲 צור אימון להיום</button>
    <div id="sessionBlocks"></div>
  </div>

</div>
<div class="toast" id="toast"></div>

const DRILL_MINS  = 5;
const FORM_MINS   = 10;
const TIME_PRESETS = [20, 30, 45, 60, 90];

// ── STATE ──────────────────────────────────────────────
let sessionMins    = 30;
let currentSession = null;
let doneTasks      = {};
let audioCtx       = null;
let stancesInterval = null;
let stancesRunning  = false;
const STANCES_TOTAL = 5.5 * 60; // 5:30
let stancesSecs     = STANCES_TOTAL;

// ── AUDIO ──────────────────────────────────────────────
let gongBuffer      = null;
let smallGongBuffer = null;

function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

function b64ToArrayBuffer(b64) {
  const bin = atob(b64);
  const buf = new ArrayBuffer(bin.length);
  const view = new Uint8Array(buf);
  for (let i = 0; i < bin.length; i++) view[i] = bin.charCodeAt(i);
  return buf;
}

function preloadAudio() {
  const ctx = getAudio();
  if (!gongBuffer) {
    ctx.decodeAudioData(b64ToArrayBuffer(AUDIO_FINAL_B64)).then(buf => { gongBuffer = buf; }).catch(() => {});
  }
  if (!smallGongBuffer) {
    ctx.decodeAudioData(b64ToArrayBuffer(AUDIO_30SEC_B64)).then(buf => { smallGongBuffer = buf; }).catch(() => {});
  }
}

function playBuffer(buffer) {
  try {
    const ctx = getAudio();
    const src = ctx.createBufferSource();
    src.buffer = buffer;
    src.connect(ctx.destination);
    src.start(0);
  } catch(e) {}
}

function playGong() {
  if (gongBuffer) {
    playBuffer(gongBuffer);
  }
  // visual finish flash (only on stances timer, not block-complete)
  const timer = document.getElementById('stances-timer');
  if (timer) {
    timer.classList.remove('finish-flash');
    void timer.offsetWidth;
    timer.classList.add('finish-flash');
    timer.addEventListener('animationend', () => timer.classList.remove('finish-flash'), { once: true });
  }
}

// ── INIT ──────────────────────────────────────────────
function init() {
  // date
  document.getElementById('dateDisplay').textContent =
    new Date().toLocaleDateString('he-IL', { weekday:'long', year:'numeric', month:'long', day:'numeric' });

  // load saved data
  try {
    const s = JSON.parse(localStorage.getItem('kf_v4') || '{}');
    if (s.sessionMins) sessionMins = s.sessionMins;
  } catch(e) {}

  buildTimePresets();
  document.getElementById('timeSlider').value = sessionMins;
  document.getElementById('timeValue').textContent = sessionMins + ' דקות';
  bindEvents();
}

// ── EVENTS (no onclick attrs — works on mobile) ────────
function bindEvents() {
  document.getElementById('timeSlider').addEventListener('input', function() {
    sessionMins = parseInt(this.value);
    document.getElementById('timeValue').textContent = sessionMins + ' דקות';
    highlightPreset();
    clearSession();
  });

  document.getElementById('generateBtn').addEventListener('click', () => {
    preloadAudio();
    generateSession();
  });
}

// ── TIME PRESETS ───────────────────────────────────────
function buildTimePresets() {
  const wrap = document.getElementById('timePresets');
  wrap.innerHTML = '';
  TIME_PRESETS.forEach(t => {
    const btn = document.createElement('button');
    btn.className = 'time-preset' + (t === sessionMins ? ' active' : '');
    btn.textContent = t < 60 ? t + ' דקות' : t === 60 ? 'שעה' : 'שעה וחצי';
    btn.dataset.mins = t;
    btn.addEventListener('click', () => {
      sessionMins = t;
      document.getElementById('timeSlider').value = t;
      document.getElementById('timeValue').textContent = t + ' דקות';
      highlightPreset();
      clearSession();
    });
    wrap.appendChild(btn);
  });
}

function highlightPreset() {
  document.querySelectorAll('.time-preset').forEach(b => {
    b.classList.toggle('active', parseInt(b.dataset.mins) === sessionMins);
  });
}

// ── SESSION ────────────────────────────────────────────
function clearSession() {
  if (stancesInterval) { clearInterval(stancesInterval); stancesInterval = null; }
  stancesRunning = false;
  stancesSecs = STANCES_TOTAL;
  currentSession = null;
  doneTasks = {};
  document.getElementById('sessionBlocks').innerHTML = '';
  document.getElementById('generateBtn').textContent = '🎲 צור אימון להיום';
}

function buildPlan(mins) {
  const warmup   = mins <= 25 ? 3 : 5;
  const stances  = mins <= 25 ? 3 : 5;
  const cooldown = mins <= 25 ? 2 : 3;
  const remaining = mins - warmup - stances - cooldown;

  const numForms  = mins < 45 ? 1 : mins < 61 ? 2 : mins < 76 ? 3 : mins < 90 ? 4 : 5;
  const numDrills = Math.max(1, Math.floor((remaining - numForms * FORM_MINS) / DRILL_MINS));

  const drills = [...DRILLS].sort(() => Math.random() - 0.5).slice(0, numDrills);
  const drillsMins = drills.reduce((sum, d) => sum + (d.mins || DRILL_MINS), 0);
  const forms  = [...FORMS].sort(() => Math.random() - 0.5).slice(0, numForms);

  return [
    { id:'warmup',   icon:'🔥', name:'חימום',       mins:warmup,              type:'simple', desc:'קפיצות, סיבובי מפרקים, מתיחות דינמיות לרגליים וכתפיים.' },
    { id:'stances',  icon:'🦵', name:'עמידות בסיס', mins:stances, type:'stances', desc:'סוס · סוס אחורי · דרקון · מספריים · חתול — החזק 30 שניות כל עמידה, עבור פעמיים.' },
    { id:'drills',   icon:'👊', name:'תרגילים',     mins:drillsMins,           type:'drills', drills },
    { id:'forms',    icon:'🌊', name:'תבניות',      mins:numForms*FORM_MINS,  type:'forms',  forms },
    { id:'cooldown', icon:'🧘', name:'הרפיה',       mins:cooldown,            type:'simple', desc:'מתיחות סטטיות, נשימות עמוקות, גלגולי צוואר וירכיים.' },
  ];
}

function generateSession() {
  clearSession();
  currentSession = buildPlan(sessionMins);
  doneTasks = {};

  const container = document.getElementById('sessionBlocks');

  // progress bar
  const prog = document.createElement('div');
  prog.className = 'progress-wrap';
  prog.innerHTML = `
    <div class="progress-label"><span>התקדמות האימון</span><span id="progressText">0 / ${currentSession.length}</span></div>
    <div class="progress-bar-bg"><div class="progress-bar-fill" id="progressBar" style="width:0%"></div></div>
  `;
  container.appendChild(prog);

  currentSession.forEach(block => {
    const el = document.createElement('div');
    el.className = 'session-block';
    el.id = 'block-' + block.id;

    let bodyHTML = '';
    if (block.type === 'simple') {
      bodyHTML = `<div class="block-body"><div class="block-simple-desc">${block.desc}</div></div>`;
    } else if (block.type === 'stances') {
      bodyHTML = `
        <div class="block-body">
          <div class="block-simple-desc">${block.desc}</div>
        </div>
        <div class="stances-timer" id="stances-timer">
          <div class="stances-display" id="stances-display">5:30</div>
          <div class="stances-sub" id="stances-sub">מוכן</div>
          <div class="stances-progress-bg"><div class="stances-progress-fill" id="stances-bar"></div></div>
          <div class="stances-btns">
            <button class="btn btn-red" id="stances-start">▶ התחל</button>
            <button class="btn btn-ghost" id="stances-reset">↺ איפוס</button>
          </div>
        </div>`;
    } else if (block.type === 'drills') {
      bodyHTML = '<div class="block-body">' + block.drills.map(d => `
        <div class="drill-card">
          <div class="drill-code">${d.code}</div>
          <div>
            <div class="drill-name">${d.name}</div>
            <div class="drill-desc">${d.desc}</div>
            <div class="drill-tags">
              <span class="drill-tag">⏱ ${d.time}</span>
              <span class="drill-tag">🔁 ${d.sets}</span>
              <span class="drill-tag">✖ ${d.reps}</span>
            </div>
          </div>
        </div>`).join('') + '</div>';
    } else if (block.type === 'forms') {
      bodyHTML = '<div class="block-body">' + block.forms.map(f => `
        <div class="form-card">
          <div class="form-card-name">${f.emoji}  ${f.name}</div>
          <div class="form-card-sub">${f.sub}</div>
          ${f.focus ? `<div class="form-card-focus">🎯 ${f.focus}</div>` : ''}
          <div class="form-card-reps">🔁 ${f.reps || 'איטי × 3, לאחר מכן מהיר × 1'}</div>
        </div>`).join('') + '</div>';
    }

    const meta = block.type === 'drills'
      ? block.drills.length + (block.drills.length === 1 ? ' תרגיל' : ' תרגילים')
      : block.type === 'forms'
        ? block.forms.length + (block.forms.length === 1 ? ' תבנית' : ' תבניות')
        : '';

    el.innerHTML = `
      <div class="session-block-header" data-id="${block.id}">
        <div class="block-check"></div>
        <div class="block-icon">${block.icon}</div>
        <div class="block-info">
          <div class="block-name">${block.name}</div>
          <div class="block-meta">${meta}</div>
        </div>
        <div class="block-duration">${block.mins} דקות</div>
      </div>
      ${bodyHTML}
    `;

    // attach click via addEventListener
    el.querySelector('.session-block-header').addEventListener('click', () => toggleBlock(block.id));
    container.appendChild(el);
  });

  document.getElementById('generateBtn').textContent = '🔄 צור אימון חדש';

  // bind stances timer if present
  const startBtn = document.getElementById('stances-start');
  const resetBtn = document.getElementById('stances-reset');
  if (startBtn) {
    startBtn.addEventListener('click', stancesStart);
    resetBtn.addEventListener('click', stancesReset);
  }
}

// ── STANCES TIMER ──────────────────────────────────────

function fmtSecs(s) {
  return String(Math.floor(s / 60)).padStart(2,'0') + ':' + String(s % 60).padStart(2,'0');
}

function playSmallGong() {
  if (smallGongBuffer) playBuffer(smallGongBuffer);
  // visual flash
  const timer = document.getElementById('stances-timer');
  if (timer) {
    timer.classList.remove('gong-flash');
    void timer.offsetWidth;
    timer.classList.add('gong-flash');
    timer.addEventListener('animationend', () => timer.classList.remove('gong-flash'), { once: true });
  }
}

function stancesStart() {
  if (stancesRunning) return;
  preloadAudio();
  stancesRunning = true;
  const startBtn = document.getElementById('stances-start');
  if (startBtn) startBtn.textContent = '⏸ עצור';
  if (startBtn) startBtn.removeEventListener('click', stancesStart);
  if (startBtn) startBtn.addEventListener('click', stancesPause);
  document.getElementById('stances-display').classList.add('running');
  document.getElementById('stances-sub').textContent = 'מתאמן...';

  stancesInterval = setInterval(() => {
    stancesSecs--;
    const disp = document.getElementById('stances-display');
    const bar  = document.getElementById('stances-bar');
    const sub  = document.getElementById('stances-sub');
    if (disp) disp.textContent = fmtSecs(Math.max(0, stancesSecs));
    if (bar)  bar.style.width = (stancesSecs / STANCES_TOTAL * 100) + '%';

    // small gong every 30 seconds (but not at 0)
    if (stancesSecs > 0 && stancesSecs % 30 === 0) playSmallGong();

    if (stancesSecs <= 0) {
      clearInterval(stancesInterval);
      stancesRunning = false;
      if (disp) { disp.textContent = '0:00'; disp.classList.remove('running'); disp.classList.add('finished'); }
      if (bar)  bar.style.width = '0%';
      if (sub)  sub.textContent = '🔔 סיימת!';
      const startBtn = document.getElementById('stances-start');
      if (startBtn) startBtn.textContent = '▶ התחל';
      playGong(); // big gong at the end
    }
  }, 1000);
}

function stancesPause() {
  clearInterval(stancesInterval);
  stancesRunning = false;
  const startBtn = document.getElementById('stances-start');
  if (startBtn) { startBtn.textContent = '▶ המשך'; startBtn.removeEventListener('click', stancesPause); startBtn.addEventListener('click', stancesStart); }
  const sub = document.getElementById('stances-sub');
  if (sub) sub.textContent = 'מושהה';
  const disp = document.getElementById('stances-display');
  if (disp) disp.classList.remove('running');
}

function stancesReset() {
  clearInterval(stancesInterval);
  stancesRunning = false;
  stancesSecs = STANCES_TOTAL;
  const disp = document.getElementById('stances-display');
  const bar  = document.getElementById('stances-bar');
  const sub  = document.getElementById('stances-sub');
  const startBtn = document.getElementById('stances-start');
  if (disp) { disp.textContent = fmtSecs(STANCES_TOTAL); disp.classList.remove('running','finished'); }
  if (bar)  bar.style.width = '100%';
  if (sub)  sub.textContent = 'מוכן';
  if (startBtn) { startBtn.textContent = '▶ התחל'; startBtn.removeEventListener('click', stancesPause); startBtn.addEventListener('click', stancesStart); }
}

function toggleBlock(id) {
  doneTasks[id] = !doneTasks[id];
  const el  = document.getElementById('block-' + id);
  const chk = el.querySelector('.block-check');
  el.classList.toggle('done', doneTasks[id]);
  chk.textContent = doneTasks[id] ? '✓' : '';

  if (doneTasks[id]) {
    playGong();
  }

  const done  = Object.values(doneTasks).filter(Boolean).length;
  const total = currentSession.length;
  const pt = document.getElementById('progressText');
  const pb = document.getElementById('progressBar');
  if (pt) pt.textContent = done + ' / ' + total;
  if (pb) pb.style.width = (done / total * 100) + '%';
}

// ── TOAST ─────────────────────────────────────────────
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}

init();


</script>
